server:
  port: 8080

spring:
  application:
    name: coldchain-traceability
  datasource:
    url: jdbc:postgresql://localhost:5432/coldchain_db
    username: coldchain_user
    password: coldchain_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

logging:
  level:
    com.coldchain.traceability: DEBUG
    org.hibernate.SQL: DEBUG
